{% extends "gestion_personal/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Usuario{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1><i class="fas fa-user-shield me-2"></i>{% if form.instance.pk %}Editar{% else %}Nuevo{% endif %} Usuario</h1>
  <a href="{% url 'global_user_list' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="row">
  <div class="col-md-8 mx-auto">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button class="btn btn-primary w-100 mt-3">
            <i class="fas fa-save me-1"></i>Guardar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
