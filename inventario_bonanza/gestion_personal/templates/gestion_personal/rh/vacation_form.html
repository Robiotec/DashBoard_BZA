{% extends "gestion_personal/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Registrar Vacaciones{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1><i class="fas fa-umbrella-beach me-2"></i>Registrar Vacaciones</h1>
  <a href="{% url 'vacation_list' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="row">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0"><i class="fas fa-calendar-plus me-2"></i>Periodo de vacaciones</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button class="btn btn-info text-white mt-2">
            <i class="fas fa-save me-1"></i>Guardar vacaciones
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
