{% extends "gestion_personal/base.html" %}
{% load crispy_forms_tags %}

{% block title %}Registrar Sanción - RH{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1><i class="fas fa-gavel me-2"></i>Registrar Sanción</h1>
  <a href="{% url 'dashboard_rrhh' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left me-1"></i>Volver al panel
  </a>
</div>

<div class="row">
  <div class="col-md-8 mx-auto">
    <div class="card shadow-sm">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="fas fa-clipboard-list me-2"></i>Datos de la sanción</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-danger">
              <i class="fas fa-save me-1"></i>Guardar Sanción
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
